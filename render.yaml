services:
  - type: web
    name: mirhapret-backend
    runtime: node
    buildCommand: cd apps/backend && npm install && npm run build
    startCommand: node apps/backend/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: mirhapret-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mirhapret-postgres
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: mirhapret-postgres
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: mirhapret-postgres
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: mirhapret-postgres
          property: database
      - key: DB_SYNCHRONIZE
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:3001,http://localhost:3002,http://localhost:5173
      - key: API_PREFIX
        value: api/v1
      - key: APP_NAME
        value: Mirhapret E-commerce

  - type: pserv
    name: mirhapret-postgres
    ipAllowList: []
    plan: free
